name: Pterodactyl All-in-One Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install & Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup Pterodactyl (Panel & Wings)
        run: |
          IP_TS=$(tailscale ip -4)
          
          # Download script
          curl -s -L -o install.sh https://pterodactyl-installer.se
          chmod +x install.sh
          
          # Kirim input '2' (Install Both) secara otomatis ke script
          printf "2\n" | sudo ./install.sh --install-panel --install-wings \
            --email "admin@zan.my.id" \
            --user "admin" \
            --firstname "Zan" \
            --lastname "Admin" \
            --password "zan12345" \
            --fqdn "$IP_TS" \
            --timezone "Asia/Jakarta" \
            --no-interact

      - name: Update DuckDNS
        run: |
          IP_TS=$(tailscale ip -4)
          curl -s "https://www.duckdns.org/update?domains=zanhosting&token=${{ secrets.DUCKDNS_TOKEN }}&ip=$IP_TS"

      - name: Telegram Notification
        if: always()
        run: |
          IP_TS=$(tailscale ip -4)
          MESSAGE="🔥 *ZanHosting Online 6 Jam!*%0A%0A🌐 *Domain:* http://zanhosting.duckdns.org%0A📍 *IP Tailscale:* \`$IP_TS\`%0A👤 *User:* \`admin\`%0A🔑 *Pass:* \`zan12345\`"
          
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown"

      - name: Keep Server Alive (6 Hours)
        run: |
          echo "Server online... Jangan di-close workflow-nya!"
          # Perintah agar GitHub tetap nyala selama 6 jam (21600 detik)
          sleep 21600
          
