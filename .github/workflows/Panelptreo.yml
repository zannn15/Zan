name: Pterodactyl All-in-One Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install & Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup Pterodactyl (Panel & Wings)
        run: |
          # Ambil IP Tailscale
          IP_TS=$(tailscale ip -4)
          
          # Jalankan Installer All-in-One (Panel + Wings)
          # Menggunakan flag otomatis agar tidak berhenti minta input
          bash <(curl -s https://pterodactyl-installer.se) --install-panel --install-wings \
            --email "admin@zan.my.id" \
            --user "admin" \
            --firstname "Zan" \
            --lastname "Admin" \
            --password "zan12345" \
            --fqdn "$IP_TS" \
            --timezone "Asia/Jakarta" \
            --no-interact

      - name: Update DuckDNS
        run: |
          IP_TS=$(tailscale ip -4)
          curl -s "https://www.duckdns.org/update?domains=zanhosting&token=${{ secrets.DUCKDNS_TOKEN }}&ip=$IP_TS"

      - name: Telegram Notification
        if: always()
        run: |
          IP_TS=$(tailscale ip -4)
          # Pesan informatif untuk Telegram
          MESSAGE="🔥 *ZanHosting All-in-One Ready!*%0A%0A🌐 *Domain:* http://zanhosting.duckdns.org%0A📍 *IP Wings:* \`$IP_TS\`%0A%0A👤 *User:* \`admin\`%0A🔑 *Pass:* \`zan12345\`%0A%0A📝 *Note:* Panel & Wings terpasang di satu server. Login dan buat Node menggunakan IP Tailscale di atas!"
          
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown"
