name: RDP Windows

on:
  workflow_dispatch:
  repository_dispatch:
    types: [rdp-start]

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Enable RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale" > $null 2>&1
          netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      - name: Create User RDP
        run: |
          $user = "RDP"
          $pass = "Vizzan15;"
          net user $user $pass /add
          net localgroup Administrators $user /add
          net localgroup "Remote Desktop Users" $user /add

      - name: Install Tailscale
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $file = "$env:TEMP\ts.msi"
          Invoke-WebRequest -Uri $url -OutFile $file
          msiexec /i "$file" /quiet /norestart
          Remove-Item $file -Force

      - name: Connect Tailscale
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TS_AUTH }} --hostname=rdp-fix
          Start-Sleep 10
          $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "IP=$ip" >> $env:GITHUB_ENV

      - name: Kirim IP ke Telegram
        run: |
          $msg = "✅ RDP READY%0AIP: $env:IP%0AUser: RDP%0APass: Vizzan15;"
          $url = "https://api.telegram.org/bot${{ secrets.TG_BOT }}/sendMessage?chat_id=${{ secrets.TG_ID }}&text=$msg"
          Invoke-RestMethod -Uri $url -Method Get

      - name: Show Info
        run: |
          Write-Host ""
          Write-Host "====================="
          Write-Host "IP : $env:IP"
          Write-Host "User: RDP"
          Write-Host "Pass: Vizzan15;"
          Write-Host "====================="
          Write-Host ""

      - name: Keep Alive (6 Jam)
        run: |
          $end = (Get-Date).AddHours(6)
          while ((Get-Date) -lt $end) {
            $sisa = $end - (Get-Date)
            Write-Host "[$(Get-Date -Format HH:mm:ss)] RDP Aktif - Sisa: $($sisa.Hours)j $($sisa.Minutes)m"
            Start-Sleep 300
          }

      - name: Logout
        if: always()
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" logout
