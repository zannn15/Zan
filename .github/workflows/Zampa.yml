name: Pterodactyl Fixed

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install & Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup Pterodactyl Panel
        run: |
          IP_TS=$(tailscale ip -4)
          
          # Pakai cara resmi dari dokumentasi pterodactyl-installer
          # Kita masukkan timezone langsung ke environment agar tidak ditanya
          export DEBIAN_FRONTEND=noninteractive
          export TZ="Asia/Jakarta"
          
          # Download dan jalankan via curl yang lebih stabil
          curl -sSLo panel.sh https://pterodactyl-installer.se
          sudo bash panel.sh --install-panel \
            --email "admin@zan.my.id" \
            --user "admin" \
            --firstname "Zan" \
            --lastname "Admin" \
            --password "zan12345" \
            --fqdn "$IP_TS" \
            --timezone "Asia/Jakarta" \
            --no-interact

      - name: Install Wings
        run: |
          # Install Wings secara terpisah
          curl -sSLo wings.sh https://pterodactyl-installer.se
          sudo bash wings.sh --install-wings --no-interact

      - name: Update DuckDNS
        run: |
          IP_TS=$(tailscale ip -4)
          curl -s "https://www.duckdns.org/update?domains=zanhosting&token=${{ secrets.DUCKDNS_TOKEN }}&ip=$IP_TS"

      - name: Telegram Notification
        if: always()
        run: |
          IP_TS=$(tailscale ip -4)
          MESSAGE="🔥 *Pterodactyl Sudah Terpasang!*%0A%0A🌐 *Domain:* http://zanhosting.duckdns.org%0A📍 *IP:* \`$IP_TS\`%0A👤 *User:* \`admin\`%0A🔑 *Pass:* \`zan12345\`"
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d text="$MESSAGE" -d parse_mode="Markdown"

      - name: Keep Alive (6 Hours)
        run: sleep 21600
        
